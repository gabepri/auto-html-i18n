name: Publish to npm

on:
  release:
    types: [created]
  workflow_dispatch: {}

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: npm
    permissions:
      contents: read
      id-token: write
    defaults:
      run:
        working-directory: packages/js
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          # npm >= 11.5.1 is required for OIDC trusted publishing; node 24 ships 11.16+.
          # (node 22 bundles npm 10.9, which silently publishes unauthenticated -> 404.)
          node-version: 24
          registry-url: https://registry.npmjs.org
          cache: npm
          cache-dependency-path: packages/js/package-lock.json
      - run: npm ci
      - run: npm run build
      - run: npm publish --provenance --access public
